<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Something wonderful is waiting for you.">
  <meta property="og:title" content="A Little Something for You">
  <meta property="og:description" content="Something wonderful is waiting for you.">
  <title>A Little Something for You</title>
  <style>
    :root {
      color-scheme: dark;
      --midnight: #111827;
      --midnight-soft: #1b2537;
      --ivory: #f9f4e8;
      --champagne: #dcbf7c;
      --champagne-light: #f3dfac;
      --plum: #713b63;
      --rose: #d98996;
      --sage: #9eb9a8;
      --paper-ink: #252b35;
      --sans: Inter, "Avenir Next", Avenir, "Helvetica Neue", Arial, sans-serif;
      --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100svh;
      overflow: hidden;
      color: var(--ivory);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 15% 15%, rgba(113, 59, 99, .52), transparent 32rem),
        radial-gradient(circle at 86% 82%, rgba(56, 102, 106, .42), transparent 34rem),
        var(--midnight);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: .12;
      background:
        repeating-radial-gradient(circle at 17% 29%, rgba(255, 255, 255, .5) 0 1px, transparent 1px 4px),
        repeating-radial-gradient(circle at 73% 61%, rgba(0, 0, 0, .35) 0 1px, transparent 1px 5px);
      background-size: 7px 9px, 11px 13px;
      mix-blend-mode: soft-light;
    }

    button { font: inherit; }

    .music-toggle {
      position: fixed;
      top: clamp(1rem, 3vw, 1.75rem);
      right: clamp(1rem, 3vw, 1.75rem);
      z-index: 12;
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      min-height: 2.8rem;
      padding: .55rem .9rem .55rem .6rem;
      color: var(--ivory);
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: rgba(17, 24, 39, .58);
      border: 1px solid rgba(243, 223, 172, .28);
      border-radius: 999px;
      box-shadow: 0 .7rem 2rem rgba(0, 0, 0, .16);
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: background .25s ease, border-color .25s ease, transform .25s ease;
    }

    .music-toggle:hover {
      background: rgba(113, 59, 99, .78);
      border-color: rgba(243, 223, 172, .65);
      transform: translateY(-2px);
    }

    .music-toggle[aria-pressed="false"] { opacity: .68; }

    .music-note {
      display: grid;
      width: 1.7rem;
      aspect-ratio: 1;
      place-items: center;
      color: var(--midnight);
      font-size: 1rem;
      background: var(--champagne-light);
      border-radius: 50%;
    }

    .music-toggle[aria-pressed="true"] .music-note {
      animation: music-pulse 1.8s ease-in-out infinite;
    }

    .ambient,
    .ambient::before,
    .ambient::after {
      position: fixed;
      border: 1px solid rgba(243, 223, 172, .18);
      border-radius: 50%;
      pointer-events: none;
    }

    .ambient {
      width: min(48vw, 35rem);
      aspect-ratio: 1;
      top: -23rem;
      right: -10rem;
      animation: ambient-float 12s ease-in-out infinite alternate;
    }

    .ambient::before {
      content: "";
      inset: 3rem;
    }

    .ambient::after {
      content: "";
      inset: 6rem;
    }

    .spark {
      position: fixed;
      width: .35rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--champagne-light);
      box-shadow: 0 0 1.2rem rgba(243, 223, 172, .8);
      animation: twinkle 2.8s ease-in-out infinite;
    }

    .spark::before,
    .spark::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      background: var(--champagne-light);
      transform: translate(-50%, -50%);
      opacity: .65;
    }

    .spark::before { width: 2.1rem; height: 1px; }
    .spark::after { width: 1px; height: 2.1rem; }
    .spark-one { top: 13%; left: 12%; }
    .spark-two { right: 13%; bottom: 14%; animation-delay: -1.1s; transform: scale(.65); }
    .spark-three { top: 29%; right: 8%; animation-delay: -.55s; transform: scale(.42); }

    .stage {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 3rem);
      isolation: isolate;
    }

    .card {
      position: relative;
      width: min(92vw, 56rem);
      min-height: min(78svh, 44rem);
      display: grid;
      place-items: center;
      padding: clamp(2.2rem, 7vw, 5.7rem);
      overflow: hidden;
      color: var(--paper-ink);
      text-align: center;
      background:
        linear-gradient(rgba(249, 244, 232, .97), rgba(249, 244, 232, .97)),
        repeating-linear-gradient(0deg, transparent 0 4px, rgba(40, 30, 20, .04) 4px 5px);
      border: 1px solid rgba(243, 223, 172, .75);
      border-radius: clamp(1.5rem, 4vw, 3rem);
      box-shadow:
        0 2.5rem 8rem rgba(0, 0, 0, .35),
        inset 0 0 0 .55rem rgba(255, 255, 255, .32);
      transition: transform .8s cubic-bezier(.16, 1, .3, 1);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 7rem;
      aspect-ratio: 1;
      border-color: rgba(113, 59, 99, .3);
      pointer-events: none;
    }

    .card::before {
      top: 1.4rem;
      left: 1.4rem;
      border-top: 1px solid;
      border-left: 1px solid;
      border-radius: 1.2rem 0 0;
    }

    .card::after {
      right: 1.4rem;
      bottom: 1.4rem;
      border-right: 1px solid;
      border-bottom: 1px solid;
      border-radius: 0 0 1.2rem;
    }

    .intro {
      width: 100%;
      transition: opacity .4s ease, transform .7s cubic-bezier(.16, 1, .3, 1);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      margin: 0 0 1.7rem;
      color: var(--plum);
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .kicker::before,
    .kicker::after {
      content: "";
      width: 2.2rem;
      height: 1px;
      background: currentColor;
      opacity: .45;
    }

    h1 {
      max-width: 10ch;
      margin: 0 auto;
      font: 500 clamp(3.4rem, 9vw, 7.5rem)/.82 var(--serif);
      letter-spacing: -.065em;
      text-wrap: balance;
    }

    h1 em {
      display: block;
      color: var(--plum);
      font-weight: 400;
    }

    .hint {
      max-width: 31rem;
      margin: 2rem auto 2.3rem;
      color: #5f6268;
      font-size: clamp(.96rem, 2.2vw, 1.08rem);
      line-height: 1.65;
      text-wrap: balance;
    }

    .primary,
    .replay {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .85rem;
      min-width: 14rem;
      min-height: 3.7rem;
      padding: .85rem 1.5rem;
      color: var(--ivory);
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
      background: var(--midnight);
      border: 1px solid var(--midnight);
      border-radius: 999px;
      box-shadow: 0 .65rem 1.6rem rgba(17, 24, 39, .23);
      cursor: pointer;
      transition: color .25s ease, background .25s ease, transform .25s ease, box-shadow .25s ease;
    }

    .primary span {
      display: grid;
      width: 1.7rem;
      aspect-ratio: 1;
      place-items: center;
      color: var(--midnight);
      font-size: 1.1rem;
      background: var(--champagne-light);
      border-radius: 50%;
      transition: transform .35s cubic-bezier(.16, 1, .3, 1);
    }

    .primary:hover,
    .replay:hover {
      color: var(--midnight);
      background: var(--champagne-light);
      border-color: var(--champagne);
      transform: translateY(-3px);
      box-shadow: 0 1rem 2rem rgba(17, 24, 39, .2);
    }

    .primary:hover span { transform: translateX(.25rem) rotate(-12deg); }
    button:focus-visible { outline: 3px solid var(--plum); outline-offset: 5px; }
    button:disabled { cursor: default; }

    .whisper {
      margin: 1.6rem 0 0;
      color: #89867f;
      font: italic .9rem/1.4 var(--serif);
    }

    .countdown {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      opacity: 0;
      visibility: hidden;
      transform: scale(.92);
      transition: opacity .5s ease, transform .7s cubic-bezier(.16, 1, .3, 1);
    }

    .card[data-state="counting"] .intro {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-2rem);
    }

    .card[data-state="counting"] .countdown {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .count-shell {
      position: relative;
      width: min(65vw, 22rem);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, var(--ivory) 0 58%, transparent 58.4%),
        conic-gradient(var(--plum) var(--progress, 0deg), rgba(113, 59, 99, .12) 0);
      box-shadow: inset 0 0 0 1px rgba(113, 59, 99, .08);
      transition: background .5s ease;
    }

    .count-shell::before,
    .count-shell::after {
      content: "";
      position: absolute;
      border: 1px solid rgba(113, 59, 99, .18);
      border-radius: 50%;
    }

    .count-shell::before { inset: -1.2rem; }
    .count-shell::after { inset: -2.25rem; border-style: dashed; animation: spin 18s linear infinite; }

    .count-inner {
      position: relative;
      z-index: 1;
    }

    .count-label {
      display: block;
      margin-bottom: .4rem;
      color: var(--plum);
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .count {
      display: block;
      min-width: 2ch;
      margin: 0;
      font: 500 clamp(6rem, 21vw, 11rem)/.76 var(--serif);
      letter-spacing: -.08em;
      color: var(--paper-ink);
      font-variant-numeric: tabular-nums;
    }

    .count.pop { animation: number-pop .72s cubic-bezier(.16, 1, .3, 1); }

    .count-note {
      position: absolute;
      right: 0;
      bottom: -5rem;
      left: 0;
      margin: 0;
      color: #6e6c68;
      font: italic 1rem/1.4 var(--serif);
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      visibility: hidden;
      background: white;
    }

    .flash.run {
      visibility: visible;
      animation: camera-flash 1.25s ease-out forwards;
    }

    .reveal {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 4vw, 3rem);
      overflow: hidden;
      color: var(--ivory);
      text-align: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(113, 59, 99, .88), transparent 25rem),
        linear-gradient(145deg, #181827, #111827 65%, #152c31);
      opacity: 0;
      visibility: hidden;
      transform: scale(1.08);
      transition: opacity .9s ease .35s, transform 1.4s cubic-bezier(.16, 1, .3, 1) .25s;
    }

    .reveal.show {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }

    .reveal::before {
      content: "";
      position: absolute;
      width: min(82vw, 45rem);
      aspect-ratio: 1;
      border: 1px solid rgba(243, 223, 172, .18);
      border-radius: 50%;
      box-shadow:
        0 0 0 3rem rgba(243, 223, 172, .025),
        0 0 0 7rem rgba(243, 223, 172, .02);
    }

    .announcement {
      position: relative;
      z-index: 2;
      width: min(92vw, 62rem);
    }

    .announcement > * {
      opacity: 0;
      transform: translateY(1.4rem);
    }

    .reveal.show .announcement > * {
      animation: reveal-up .85s cubic-bezier(.16, 1, .3, 1) forwards;
    }

    .reveal.show .announcement > :nth-child(1) { animation-delay: .65s; }
    .reveal.show .announcement > :nth-child(2) { animation-delay: .82s; }
    .reveal.show .announcement > :nth-child(3) { animation-delay: 1.05s; }
    .reveal.show .announcement > :nth-child(4) { animation-delay: 1.25s; }
    .reveal.show .announcement > :nth-child(5) { animation-delay: 1.45s; }
    .reveal.show .announcement > :nth-child(6) { animation-delay: 1.65s; }

    .to-names {
      margin: 0 0 1rem;
      color: var(--champagne-light);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .pre-title {
      margin: 0 0 1.1rem;
      font: italic clamp(1.15rem, 3vw, 1.65rem)/1.35 var(--serif);
      color: rgba(249, 244, 232, .76);
    }

    .announcement h2 {
      margin: 0;
      font: 500 clamp(4.1rem, 14vw, 9.5rem)/.78 var(--serif);
      letter-spacing: -.065em;
      text-wrap: balance;
    }

    .announcement h2 em {
      display: block;
      color: var(--champagne-light);
      font-weight: 400;
    }

    .announcement-line {
      width: min(8rem, 25vw);
      height: 1px;
      margin: 2rem auto 1.5rem;
      background: linear-gradient(90deg, transparent, var(--champagne), transparent);
    }

    .congrats {
      margin: 0;
      font-size: clamp(.8rem, 2vw, 1rem);
      font-weight: 800;
      letter-spacing: .16em;
      line-height: 1.6;
      text-transform: uppercase;
    }

    .replay {
      min-width: 0;
      min-height: 3.2rem;
      margin-top: 2rem;
      color: var(--midnight);
      background: var(--champagne-light);
      border-color: var(--champagne-light);
      box-shadow: none;
    }

    .replay:hover { color: var(--ivory); background: transparent; }

    .confetti {
      position: absolute;
      z-index: 1;
      top: -12vh;
      left: var(--left);
      width: var(--size);
      height: calc(var(--size) * 1.8);
      border-radius: 999px;
      background: var(--color);
      opacity: .9;
      animation: fall var(--duration) var(--delay) linear infinite;
      transform: rotate(var(--turn));
    }

    .confetti.dot {
      height: var(--size);
      border-radius: 50%;
      box-shadow: 0 0 1rem var(--color);
    }

    @keyframes ambient-float {
      to { transform: translate(-2rem, 2rem) rotate(12deg); }
    }

    @keyframes music-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(243, 223, 172, .1); }
      50% { box-shadow: 0 0 0 .35rem rgba(243, 223, 172, .12); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: .2; transform: scale(.6) rotate(0); }
      50% { opacity: 1; transform: scale(1) rotate(45deg); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes number-pop {
      0% { opacity: 0; transform: translateY(.4em) scale(.7); filter: blur(8px); }
      52% { opacity: 1; transform: translateY(0) scale(1.08); filter: blur(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes camera-flash {
      0% { opacity: 0; }
      15% { opacity: 1; }
      28% { opacity: .15; background: var(--champagne-light); }
      42% { opacity: .88; }
      100% { opacity: 0; visibility: hidden; }
    }

    @keyframes reveal-up {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fall {
      to { transform: translate3d(var(--drift), 120vh, 0) rotate(calc(var(--turn) + 820deg)); }
    }

    @media (max-width: 600px) {
      .card { min-height: 78svh; padding: 2.5rem 1.55rem; }
      .kicker::before, .kicker::after { width: 1.15rem; }
      .hint { margin-top: 1.5rem; }
      .count-shell { width: min(60vw, 17rem); }
      .count-note { bottom: -4.3rem; }
      .announcement h2 { font-size: clamp(4.2rem, 19vw, 7rem); }
      .spark-three { display: none; }
      .music-toggle { padding-right: .6rem; }
      .music-toggle span:last-child { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div
    id="announcement-data"
    hidden
    data-names="Parth &amp; Simoni"
    data-title-first="Fua"
    data-title-second="Fai"
    data-congratulations="Congratulations — you’ve been promoted."
  ></div>

  <audio
    id="background-music"
    loop
    playsinline
    preload="metadata"
    src="https://assets.mixkit.co/music/599/599.mp3"
  ></audio>

  <button
    class="music-toggle"
    id="music-toggle"
    type="button"
    aria-label="Turn music off"
    aria-pressed="true"
  >
    <span class="music-note" aria-hidden="true">♪</span>
    <span id="music-label">Music on</span>
  </button>

  <div class="ambient" aria-hidden="true"></div>
  <i class="spark spark-one" aria-hidden="true"></i>
  <i class="spark spark-two" aria-hidden="true"></i>
  <i class="spark spark-three" aria-hidden="true"></i>

  <main class="stage">
    <section class="card" id="card" data-state="intro" aria-labelledby="title">
      <div class="intro">
        <p class="kicker">Strictly between us</p>
        <h1 id="title">A little secret <em>is waiting.</em></h1>
        <p class="hint">Some moments arrive quietly—and then change everything. This one is just for you.</p>
        <button class="primary" id="start" type="button">
          Open the surprise
          <span aria-hidden="true">→</span>
        </button>
        <p class="whisper">Sound on is optional. Butterflies are not.</p>
      </div>

      <div class="countdown" aria-hidden="true" id="countdown">
        <div class="count-shell" id="count-shell">
          <div class="count-inner">
            <span class="count-label">Revealing in</span>
            <p class="count" id="count" role="timer" aria-live="assertive"></p>
          </div>
          <p class="count-note">A moment can change everything…</p>
        </div>
      </div>
    </section>
  </main>

  <div class="flash" id="flash" aria-hidden="true"></div>

  <section class="reveal" id="reveal" role="dialog" aria-modal="true" aria-labelledby="announcement-title">
    <div class="announcement">
      <p class="to-names" id="to-names"></p>
      <p class="pre-title">Your next chapter begins as…</p>
      <h2 id="announcement-title">
        <span id="title-first"></span>
        <em>&amp; <span id="title-second"></span></em>
      </h2>
      <div class="announcement-line" aria-hidden="true"></div>
      <p class="congrats" id="congrats"></p>
      <button class="replay" id="replay" type="button">Watch it again</button>
    </div>
  </section>

  <script>
    const data = document.querySelector("#announcement-data").dataset;
    const card = document.querySelector("#card");
    const startButton = document.querySelector("#start");
    const countdown = document.querySelector("#countdown");
    const countDisplay = document.querySelector("#count");
    const countShell = document.querySelector("#count-shell");
    const flash = document.querySelector("#flash");
    const reveal = document.querySelector("#reveal");
    const replayButton = document.querySelector("#replay");
    const backgroundMusic = document.querySelector("#background-music");
    const musicToggle = document.querySelector("#music-toggle");
    const musicLabel = document.querySelector("#music-label");
    let timer;
    let volumeFrame;
    let experienceStarted = false;
    let musicEnabled = true;

    backgroundMusic.volume = 0;

    document.querySelector("#to-names").textContent = `For ${data.names}`;
    document.querySelector("#title-first").textContent = data.titleFirst;
    document.querySelector("#title-second").textContent = data.titleSecond;
    document.querySelector("#congrats").textContent = data.congratulations;

    for (let i = 0; i < 62; i += 1) {
      const piece = document.createElement("i");
      piece.className = `confetti${i % 5 === 0 ? " dot" : ""}`;
      piece.setAttribute("aria-hidden", "true");
      piece.style.setProperty("--left", `${Math.random() * 100}%`);
      piece.style.setProperty("--delay", `${Math.random() * -5}s`);
      piece.style.setProperty("--duration", `${3.4 + Math.random() * 4.4}s`);
      piece.style.setProperty("--turn", `${Math.random() * 180}deg`);
      piece.style.setProperty("--drift", `${-80 + Math.random() * 160}px`);
      piece.style.setProperty("--size", `${5 + Math.random() * 8}px`);
      piece.style.setProperty("--color", ["#f3dfac", "#d98996", "#9eb9a8", "#b796c4", "#f9f4e8"][i % 5]);
      reveal.append(piece);
    }

    function showNumber(number) {
      countDisplay.textContent = number;
      countShell.style.setProperty("--progress", `${(11 - number) * 36}deg`);
      countDisplay.classList.remove("pop");
      void countDisplay.offsetWidth;
      countDisplay.classList.add("pop");
    }

    function updateMusicControl() {
      musicToggle.setAttribute("aria-pressed", String(musicEnabled));
      musicToggle.setAttribute("aria-label", musicEnabled ? "Turn music off" : "Turn music on");
      musicLabel.textContent = musicEnabled ? "Music on" : "Music off";
    }

    function fadeMusicTo(target, duration = 900) {
      window.cancelAnimationFrame(volumeFrame);
      const initialVolume = backgroundMusic.volume;
      const startedAt = performance.now();

      function step(now) {
        const progress = Math.min((now - startedAt) / duration, 1);
        backgroundMusic.volume = initialVolume + (target - initialVolume) * progress;
        if (progress < 1) volumeFrame = window.requestAnimationFrame(step);
      }

      volumeFrame = window.requestAnimationFrame(step);
    }

    async function playMusic(targetVolume = .24) {
      if (!musicEnabled) return;
      try {
        await backgroundMusic.play();
        fadeMusicTo(targetVolume);
      } catch {
        musicEnabled = false;
        updateMusicControl();
      }
    }

    function toggleMusic() {
      musicEnabled = !musicEnabled;
      updateMusicControl();

      if (!musicEnabled) {
        backgroundMusic.pause();
        return;
      }

      if (experienceStarted) playMusic(reveal.classList.contains("show") ? .34 : .24);
    }

    function beginCountdown() {
      clearInterval(timer);
      experienceStarted = true;
      startButton.disabled = true;
      card.dataset.state = "counting";
      countdown.setAttribute("aria-hidden", "false");
      playMusic();
      let number = 10;
      showNumber(number);

      timer = setInterval(() => {
        number -= 1;
        if (number > 0) {
          showNumber(number);
          return;
        }

        clearInterval(timer);
        flash.classList.add("run");
        reveal.classList.add("show");
        if (musicEnabled) fadeMusicTo(.34, 1200);
        window.setTimeout(() => replayButton.focus(), 1550);
      }, 1000);
    }

    function reset() {
      clearInterval(timer);
      experienceStarted = false;
      window.cancelAnimationFrame(volumeFrame);
      backgroundMusic.pause();
      backgroundMusic.currentTime = 0;
      backgroundMusic.volume = 0;
      reveal.classList.remove("show");
      flash.classList.remove("run");
      card.dataset.state = "intro";
      countdown.setAttribute("aria-hidden", "true");
      countDisplay.textContent = "";
      countShell.style.setProperty("--progress", "0deg");
      startButton.disabled = false;
      startButton.focus();
    }

    startButton.addEventListener("click", beginCountdown);
    replayButton.addEventListener("click", reset);
    musicToggle.addEventListener("click", toggleMusic);
  </script>
</body>
</html>
